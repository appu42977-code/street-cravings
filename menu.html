<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Street Cravings</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* STREET FOOD BACKGROUND */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('images/p.jpg') no-repeat center center/cover;
        }

        /* HEADER RIGHT */
        .header {
            display: flex;
            justify-content: flex-start;
            padding: 20px 40px;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        /* MAIN LAYOUT */
        .main {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        /* MENU CENTER */
         menu {
    width: 65%;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;   /* 🔥 THIS creates space */
            
        }
        .card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    padding: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

        /* CART RIGHT */
        .cart-box {
            width: 25%;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- RIGHT SIDE NAME -->
    <div class="header">
        <div class="brand">🍔 Street Cravings</div>
    </div>

    <!-- CONTENT -->
    <div class="main">

        <!-- MENU -->
        <div id="menu" class="menu"></div>

        <!-- CART -->
    <!-- BOTTOM CART -->
<div class="bottom-cart" id="bottomCart">
    <h3>🛒 Cart</h3>
    <div id="cart"></div>
    <button onclick="placeOrder()">Place Order</button>
</div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>
    

</body>
</html>
